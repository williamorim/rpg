- defesa_sem_armadura_monge:
  - nome: "Defesa sem Armadura (monge)"
  - descricao: "Enquanto você não estiver vestindo armadura nem usando um escudo, sua Classe de Armadura é <b>10 + seu modificador de Destreza + seu modificador de Sabedoria</b>."

- defesa_sem_armadura_barbaro:
  - nome: "Defesa sem Armadura (bárbaro)"
  - descricao: "Enquanto você não estiver vestindo armadura nem usando um escudo, sua Classe de Armadura é <b>10 + seu modificador de Destreza + seu modificador de Constituição</b>."

- deslocamento_sem_armadura_monge:
  - nome: "Deslocamento sem Armadura (monge)"
  - descricao: "Seu deslocamento aumenta em 3 metros enquanto você não estiver vestindo armadura nem usando um escudo."

- sem_forma:
  - nome: "Sem Forma"
  - descricao: "Você pode se espremer através de um espaço tão estreito quanto 2,5 cm de largura, desde que não esteja vestindo ou carregando nada. Você também tem <b>vantagem em testes de habilidade que fizer para iniciar ou escapar de uma agarração</b>."

- visao_escuro:
  - nome: "Visão no Escuro"
  - descricao: "Você pode <b>ver na penumbra a até 18 metros de você como se fosse luz plena</b>, e na escuridão como se fosse penumbra. Você discerne cores nessa escuridão apenas como tons de cinza"

- segurar_folego:
  - nome: "Segurar o Fôlego"
  - descricao: "Você pode segurar o fôlego por até 1 hora."

- resiliencia_natural:
  - nome: "Resiliência Natural"
  - descricao: "Você tem <b>resistência a dano ácido e venenoso</b>. Você tem <b>vantagem</b> em testes de resistência contra ser envenenado. Você é imune a doenças."

- moldar_se:
  - nome: "Moldar-se"
  - descricao: "Como uma ação, você pode remodelar seu corpo para dar a si mesmo uma cabeça, um ou dois braços, uma ou duas pernas, e mãos e pés improvisados, ou você pode reverter para uma massa sem membros. Enquanto você tem uma forma humanoide, você pode usar roupas e armaduras feitas para um Humanoide do seu tamanho. Como uma ação bônus, <b>você pode estender um pseudópode de até 15 cm de largura e 3 metros de comprimento</b> ou reabsorvê-lo em seu corpo. Como parte da mesma ação bônus, você pode usar este pseudópode para manipular um objeto, abrir ou fechar uma porta ou recipiente, ou pegar ou colocar um objeto minúsculo. O pseudópode não contém órgãos sensoriais e não pode atacar, ativar itens mágicos, ou erguer mais de 4,5 kg."

- falsificacao:
  - nome: "Perito em Falsificação"
  - descricao: "Você pode duplicar escrita e artesanato de outras criaturas. <b>Você tem vantagem em todos os testes feitos para produzir falsificações ou duplicatas de objetos existentes.</b>"

- treinamento_kenku:
  - nome: "Treinamento Kenku"
  - descricao: "Você tem proficiência em <b>Furtividade</b> e <b>Prestidigitação</b>."
  
- mimetismo:
  - nome: "Mimetismo"
  - descricao: "Você pode imitar sons que você ouviu, incluindo vozes. Uma criatura que ouve os sons que você faz pode dizer que eles são imitações com um teste bem sucedido de Sabedoria (Intuição), contra seu teste de Carisma (Enganação)"

- ancestral_feerico:
  - nome: "Ancestral Feérico"
  - descricao: "Você tem <b>vantagem em testes de resistência contra encantamento</b>, e magias não podem colocá-lo para dormir."

- inspiracao_bardo:
  - nome: "Inspiração de Bardo"
  - descricao: "Você pode inspirar outros com sua música ou palavras animadoras. <b>Escolha uma criatura a até 18 metros que possa ouvi-lo. Ela ganha um dado de inspiração de bardo</b>. Uma vez dentro dos próximos 10 minutos, a criatura pode rolar o dado e adicionar o número rolado a um teste de habilidade, teste de ataque ou teste de resistência. A criatura pode esperar até depois de rolar o dado para decidir usá-lo, mas deve decidir antes do Mestre dizer se o teste foi bem-sucedido ou não. Uma vez usado, o dado de inspiração é perdido. Você pode usar essa característica um número de vezes igual ao seu modificador de Carisma (mínimo de uma vez). Você recupera todos os usos gastos quando termina um descanso longo."

- agilidade_felina:
  - nome: "Agilidade Felina"
  - descricao: "Você pode usar a ação de Desengajar ou Esconder-se como uma ação bônus em cada um dos seus turnos."

- garras_gato:
  - nome: "Garras de Gato"
  - descricao: "Suas garras são armas naturais, com as quais você pode desferir ataques desarmados. Se você atingir com elas, você causa 1d4 de dano cortante + seu modificador de força, em vez do dano normal de um ataque desarmado."

- golpe_desarmado_extra:
  - nome: "Golpe Desarmado Extra"
  - descricao: "Quando você usa a ação de Ataque com um golpe desarmado ou uma arma de monge no seu turno, você pode realizar um golpe desarmado com uma ação bônus."

- concha:
  - nome: "Concha"
  - descricao: "CA natural dos Tortle é 12 + O valor do modificador de Constituição."

- casco_forte:
  - nome: "Casco Forte"
  - descricao: "Com uma ação, você pode se esconder em seu casco ganhando +3 de CA. Essa deve ser a sua única ação no turno. Dentro do casco você não ataca e não se move. No inicio do seu próximo turno você tem a opção de continuar no casco ou de sair dele com uma ação bônus."

- mordida:
  - nome: "Mordida"
  - descricao: "Sempre que você atinge uma criatura com um ataque corpo a corpo na sua vez, com uma ação bônus, você pode morder o mesmo inimigo. <b>O alvo leva 2d4 + seu modificador de Força, causando dano perfurante.</b>"

- furia:
  - nome: "Fúria"
  - descricao: "Em combate, você pode entrar em fúria como uma ação bônus. Enquanto estiver em fúria, você ganha os seguintes benefícios se não estiver vestindo armadura pesada: <br><br><b>(1)</b> Você tem vantagem em testes de Força e testes de resistência de Força. <br><b>(2)</b> Quando você faz um ataque corpo a corpo com uma arma usando Força, você ganha um bônus de dano igual ao seu nível de bárbaro. <br><b>(3)</b> Você tem resistência a dano cortante, perfurante e contundente. <br><br> A fúria se encerra se você não realizar um ataque no seu turno."


- ataque_descuidado:
  - nome: "Ataque Descuidado"
  - descricao: "Quando você fizer o seu primeiro ataque no turno, você pode decidir atacar descuidadamente. Fazer isso lhe concede vantagem nas jogadas de ataque com armas corpo-a-corpo usando Força durante seu turno, porém, as jogadas de ataques feitas contra você possuem vantagem até o início do seu próximo turno."

- sentido_perigo:
  - nome: "Sentido do Perigo"
  - descricao: "Você possui vantagem em testes de resistência de Destreza contra efeitos que você possa ver, como armadilhas e magias. Para receber esse benefício você não pode estar cego, surdo ou incapacitado."

- instinto_violento:
  - nome: "Instinto Violento"
  - descricao: "Sempre que derrotar um inimigo, você terá o desejo de fazer isso de forma violenta. Para negar esse desejo, terá que passar em um teste de resistência de inteligência (CD 12). Se falhar no teste ou decidir por conta própria seguir esse desejo, todos em sua volta ficam precisam passar por um teste de resistência de inteligência (CD 14) ou ficaram em choque (não podem realizar ações por 1 turno)."

- alquimia_menor:
  - nome: "Alquimia Menor"
  - descricao: "Você pode transformar água em uma poção de cura menor. O procedimento dura 1 hora e a substância volta a ser água após 24 horas. Você também pode alterar, com taxa de 30cm a cada 10 minutos, a composição de madeira, pedra (mas não uma pedra preciosa), ferro, cobre ou prata, transformando-o em um material diferente dentre esses. O material volta a sua composição original após 1 hora."

- sintonia_plasmoide:
  - nome: "Sintonia Plasmoide"
  - descricao: "Você está cada vez mais em sintonia com o seu corpo. Seus ataques desarmados agora causam 3 + Modificador de Força de dano."

- defletir_projeteis:
  - nome: "Defletir Projéteis"
  - descricao: "Você pode usar sua reação para defletir ou apanhar o projétil quando você é atingido por um ataque de arma à distância. Quando o fizer, o dano que você sofrer do ataque é reduzido em 1d10 + seu modificador de Destreza + seu nível de monge. <br><br> Se o dano for reduzido a 0, você pode apanhar o projétil se ele for pequeno o suficiente para ser segurando em uma mão e você tenha, pelo menos, uma mão livre. Se você apanhar um projétil dessa forma, você pode gastar 1 ponto de chi para realizar uma ataque à distância com a arma ou munição que você acabou de pegar, como parte da mesma reação. Você realiza esse ataque com proficiência, independentemente das armas em que você é proficiente, e o projétil conta como uma arma de monge para o ataque. A distância do ataque do monge é de 6/18 metros."

- forma_selvagem:
  - nome: "Forma Selvagem"
  - descricao: "Você pode usar sua ação bônus para se transformar em uma besta que você tenha visto antes. Você pode usar essa característica 2 vezes, até um descanso curto ou longo. Enquanto você estiver transformado pela sua Forma Selvagem, você pode usar uma ação bônus para gastar um espaço de magia e ganhar 1d8 pontos de vida por nível do espaço de magia gasto."